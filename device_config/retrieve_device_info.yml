---
# =============================================================================
# Playbook : retrieve_device_info.yml
# Author   : Theyshigan A/L Mani Balan (A24CS0202)
# Task     : Retrieve device information
# Inventory: device_config/inventory.example.yml  (group: network_devices)
# Purpose  : Connect to the Cisco IOS device and collect key operational
#            information, then save a formatted report as output proof.
# Run:
#   ansible-galaxy collection install cisco.ios
#   ansible-playbook -i device_config/inventory.example.yml \
#       device_config/retrieve_device_info.yml
# =============================================================================
- name: Retrieve Cisco device information
  hosts: network_devices
  gather_facts: false
  connection: network_cli

  tasks:
    - name: Collect device information using show commands
      cisco.ios.ios_command:
        commands:
          - show version
          - show ip interface brief
          - show interfaces description
          - show ip route
          - show running-config
          - show users
          - show clock
      register: device_info

    - name: Gather structured device facts
      cisco.ios.ios_facts:
        gather_subset:
          - hardware
          - config
      register: ios_facts

    - name: Save retrieved device information as output proof
      ansible.builtin.copy:
        content: |
          ========================================================
          DEVICE INFORMATION REPORT
          Generated by : Theyshigan (A24CS0202)
          Host         : {{ inventory_hostname }}
          ========================================================

          --- Summary (structured facts) ---
          Hostname     : {{ ansible_net_hostname | default('N/A') }}
          Model        : {{ ansible_net_model | default('N/A') }}
          IOS Version  : {{ ansible_net_version | default('N/A') }}
          Serial No.   : {{ ansible_net_serialnum | default('N/A') }}

          --- show version ---
          {{ device_info.stdout_lines[0] | join('\n') }}

          --- show ip interface brief ---
          {{ device_info.stdout_lines[1] | join('\n') }}

          --- show interfaces description ---
          {{ device_info.stdout_lines[2] | join('\n') }}

          --- show ip route ---
          {{ device_info.stdout_lines[3] | join('\n') }}

          --- show running-config ---
          {{ device_info.stdout_lines[4] | join('\n') }}

          --- show users (logged-in users) ---
          {{ device_info.stdout_lines[5] | join('\n') }}

          --- show clock (current date and time) ---
          {{ device_info.stdout_lines[6] | join('\n') }}
          ========================================================
        dest: device_config/device_info_output.txt

    - name: Display retrieved device information on screen
      ansible.builtin.debug:
        var: device_info.stdout_lines
